<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 가계부 (오프라인)</title>
    <!-- Tailwind CDN used for UI components -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-gray-800">📊 스마트 가계부</h1>
        </header>

        <!-- Balance Summary (One line) -->
        <div class="flex gap-2 mb-6">
            <div class="flex-1 bg-white p-3 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-[10px] text-gray-500">수입</p>
                <h2 id="total-income" class="text-sm font-bold text-green-600">0원</h2>
            </div>
            <div class="flex-1 bg-white p-3 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-[10px] text-gray-500">지출</p>
                <h2 id="total-expense" class="text-sm font-bold text-red-600">0원</h2>
            </div>
            <div class="flex-1 bg-white p-3 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-[10px] text-gray-500">잔액</p>
                <h2 id="balance" class="text-sm font-bold text-blue-600">0원</h2>
            </div>
        </div>

        <!-- Transaction Form -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 mb-6">
            <form id="transaction-form" class="grid grid-cols-1 gap-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="desc" placeholder="내역" class="col-span-2 p-2.5 rounded-lg border border-gray-200 text-sm" required>
                    <input type="number" id="amount" placeholder="금액" class="p-2.5 rounded-lg border border-gray-200 text-sm" required>
                    <select id="type" class="p-2.5 rounded-lg border border-gray-200 text-sm">
                        <option value="expense">지출</option>
                        <option value="income">수입</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-lg font-semibold hover:bg-blue-700 transition text-sm">추가하기</button>
            </form>
        </div>

        <!-- Transactions List -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b border-gray-50 flex justify-between items-center">
                <h3 class="font-semibold text-gray-700 text-sm">내역</h3>
                <button onclick="clearData()" class="text-xs text-red-400 hover:text-red-600 underline">전체 삭제</button>
            </div>
            <ul id="transaction-list" class="divide-y divide-gray-50">
            </ul>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const form = document.getElementById('transaction-form');
        const list = document.getElementById('transaction-list');
        const totalIncomeEl = document.getElementById('total-income');
        const totalExpenseEl = document.getElementById('total-expense');
        const balanceEl = document.getElementById('balance');

        function updateUI() {
            list.innerHTML = '';
            let income = 0;
            let expense = 0;

            transactions.forEach((t, index) => {
                if (t.type === 'income') income += t.amount;
                else expense += t.amount;

                const li = document.createElement('li');
                li.className = 'p-3 flex justify-between items-center';
                li.innerHTML = `
                    <div>
                        <p class="font-medium text-gray-700 text-sm">${t.desc}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                            ${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()}원
                        </span>
                        <button onclick="deleteTransaction(${index})" class="text-gray-300 hover:text-red-500 text-xs">삭제</button>
                    </div>
                `;
                list.appendChild(li);
            });

            totalIncomeEl.innerText = income.toLocaleString() + '원';
            totalExpenseEl.innerText = expense.toLocaleString() + '원';
            balanceEl.innerText = (income - expense).toLocaleString() + '원';
            
            // Save to localStorage
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);
            const type = document.getElementById('type').value;

            if (amount > 0) {
                transactions.unshift({ desc, amount, type }); // Newest on top
                updateUI();
                form.reset();
            }
        });

        function deleteTransaction(index) {
            transactions.splice(index, 1);
            updateUI();
        }

        function clearData() {
            if(confirm('모든 내역을 삭제할까요?')) {
                transactions = [];
                updateUI();
            }
        }

        // Initial render
        updateUI();
    </script>
</body>
</html>
